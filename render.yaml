services:
  - type: web
    name: eleos-worker
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm --workspace @eleos/worker run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eleos-db
          property: connectionString
      - key: NODE_ENV
        value: production
      # User provided secrets (Should be added in Render Dashboard)
      - key: GEMINI_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false

databases:
  - name: eleos-db
    plan: free
    databaseName: eleos
    user: eleos
